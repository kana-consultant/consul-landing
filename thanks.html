<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="light only" />
  <meta name="darkreader-lock" />
  <meta name="robots" content="noindex,nofollow" />
  <title>Terima kasih — Perfect10</title>
  <meta name="description" content="Terima kasih. WhatsApp sudah terbuka di tab baru — Anda tinggal kirim pesannya." />

  <meta name="theme-color" content="#0A0E1A" />
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />

  <!-- ============================================================
       META PIXEL  —  Perfect10 (ID: 2041952410057672)
       This is the VALID conversion page. Reaching it = a real
       WhatsApp consultation intent, so we fire PageView + Lead here
       (NOT on the landing page) to avoid inflated / "leaking" leads.
       In Meta, you can also set a Custom Conversion on URL contains
       "thanks.html" and map it to the Lead category.
       ============================================================ -->
  <!-- Meta Pixel Code -->
  <script>
    !function(f,b,e,v,n,t,s){if(f.fbq)return;n=f.fbq=function(){n.callMethod?
    n.callMethod.apply(n,arguments):n.queue.push(arguments)};if(!f._fbq)f._fbq=n;
    n.push=n;n.loaded=!0;n.version='2.0';n.queue=[];t=b.createElement(e);t.async=!0;
    t.src=v;s=b.getElementsByTagName(e)[0];s.parentNode.insertBefore(t,s)}(window,
    document,'script','https://connect.facebook.net/en_US/fbevents.js');
    fbq('init', '2041952410057672');
    fbq('track', 'PageView');
    fbq('track', 'Lead');
  </script>
  <noscript><img height="1" width="1" style="display:none"
    src="https://www.facebook.com/tr?id=2041952410057672&ev=Lead&noscript=1"/></noscript>
  <!-- End Meta Pixel Code -->

  <style>
    :root{
      --navy:#0A0E1A; --ink:#101828; --body:#475467; --muted:#6A7383;
      --line:#EAECF0; --soft:#F6F7FB; --violet:#7C3AED; --wa:#25D366; --wa-700:#1FBF5A;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%}
    body{
      font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
      color:var(--ink); background:var(--soft);
      display:flex; align-items:center; justify-content:center;
      padding:24px; line-height:1.5;
    }
    .card{
      width:100%; max-width:520px; background:#fff; border:1px solid var(--line);
      border-radius:24px; padding:48px 40px; text-align:center;
      box-shadow:0 30px 80px -40px rgba(16,24,40,.35);
    }
    .badge{
      width:84px; height:84px; margin:0 auto 24px; border-radius:50%;
      background:linear-gradient(135deg,var(--wa),var(--wa-700));
      display:flex; align-items:center; justify-content:center;
      box-shadow:0 18px 40px -14px rgba(37,211,102,.6);
      animation:pop .45s cubic-bezier(.2,.9,.3,1.2) both;
    }
    .badge svg{width:42px;height:42px;stroke:#fff;stroke-width:3.2;fill:none;
      stroke-linecap:round;stroke-linejoin:round}
    .badge svg path{stroke-dasharray:40;stroke-dashoffset:40;
      animation:draw .5s .25s ease forwards}
    @keyframes pop{from{transform:scale(.7);opacity:0}to{transform:scale(1);opacity:1}}
    @keyframes draw{to{stroke-dashoffset:0}}
    h1{font-size:26px;font-weight:800;letter-spacing:-.02em;margin-bottom:12px}
    p.lede{font-size:16px;color:var(--body);margin-bottom:28px}
    p.lede b{color:var(--ink);font-weight:700}
    .btn{
      display:inline-flex;align-items:center;justify-content:center;gap:10px;
      width:100%;padding:15px 22px;border-radius:14px;font-size:16px;font-weight:700;
      text-decoration:none;border:none;cursor:pointer;font-family:inherit;
      transition:background .15s ease,box-shadow .15s ease,transform .05s ease;
    }
    .btn:active{transform:translateY(1px)}
    .btn--wa{background:var(--wa);color:#fff;box-shadow:0 14px 30px -12px rgba(37,211,102,.6)}
    .btn--wa:hover{background:var(--wa-700)}
    .btn--ghost{background:#fff;color:var(--ink);border:1px solid var(--line);margin-top:12px}
    .btn--ghost:hover{background:var(--soft)}
    .btn svg{width:20px;height:20px;fill:currentColor}
    .note{margin-top:22px;font-size:13px;color:var(--muted)}
    .brand{margin-top:30px;display:flex;justify-content:center}
    .brand img{height:30px;width:auto;opacity:.9}
  </style>
</head>
<body>
  <main class="card">
    <div class="badge" aria-hidden="true">
      <svg viewBox="0 0 24 24"><path d="M4 12.5l5 5L20 6.5"/></svg>
    </div>

    <h1 data-t="title">Terima kasih! 🎉</h1>
    <p class="lede" data-t="lede">
      WhatsApp sudah terbuka di tab baru — Anda tinggal <b>kirim pesannya</b>.
      Tim Perfect10 akan segera membalas.
    </p>

    <a id="wa-btn" class="btn btn--wa" href="#" rel="noopener" target="_blank">
      <svg viewBox="0 0 24 24"><path d="M.057 24l1.687-6.163a11.867 11.867 0 01-1.587-5.946C.16 5.335 5.495 0 12.05 0a11.817 11.817 0 018.413 3.488 11.824 11.824 0 013.48 8.414c-.003 6.557-5.338 11.892-11.893 11.892a11.9 11.9 0 01-5.688-1.448L.057 24zm6.597-3.807c1.676.995 3.276 1.591 5.392 1.592 5.448 0 9.886-4.434 9.889-9.885.002-5.462-4.415-9.89-9.881-9.892-5.452 0-9.887 4.434-9.889 9.884a9.86 9.86 0 001.51 5.26l-.999 3.648 3.748-.607zm11.387-5.464c-.074-.124-.272-.198-.57-.347-.297-.149-1.758-.868-2.031-.967-.272-.099-.47-.149-.669.149-.198.297-.768.967-.941 1.165-.173.198-.347.223-.644.074-.297-.149-1.255-.462-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.297-.347.446-.521.151-.172.2-.296.3-.495.099-.198.05-.372-.025-.521-.075-.148-.669-1.611-.916-2.206-.242-.579-.487-.501-.669-.51l-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.263.489 1.694.626.712.226 1.36.194 1.872.118.571-.085 1.758-.719 2.006-1.413.248-.695.248-1.29.173-1.414z"/></svg>
      <span data-t="waBtn">Buka WhatsApp lagi</span>
    </a>

    <a class="btn btn--ghost" href="index.html" data-t="home">Kembali ke beranda</a>

    <p class="note" data-t="note">Pesan tidak terkirim otomatis — pastikan Anda menekan tombol kirim di WhatsApp.</p>
    <p class="brand"><img src="assets/logo.webp" alt="Perfect10" width="384" height="131" /></p>
  </main>

  <script>
    (function () {
      // language: reuse the same key the landing page persists (i18n.js → p10_lang)
      var lang = "id";
      try {
        var saved = localStorage.getItem("p10_lang");
        if (saved === "id" || saved === "en") lang = saved;
      } catch (e) {}
      document.documentElement.lang = lang;

      var T = {
        id: {
          title: "Terima kasih! 🎉",
          lede: "WhatsApp sudah terbuka di tab baru — Anda tinggal <b>kirim pesannya</b>. Tim Perfect10 akan segera membalas.",
          waBtn: "Buka WhatsApp lagi",
          home: "Kembali ke beranda",
          note: "Pesan tidak terkirim otomatis — pastikan Anda menekan tombol kirim di WhatsApp.",
        },
        en: {
          title: "Thank you! 🎉",
          lede: "WhatsApp just opened in a new tab — all you have to do is <b>send the message</b>. The Perfect10 team will reply shortly.",
          waBtn: "Open WhatsApp again",
          home: "Back to home",
          note: "The message isn't sent automatically — make sure you tap send in WhatsApp.",
        },
      };
      var dict = T[lang] || T.id;
      document.querySelectorAll("[data-t]").forEach(function (el) {
        var v = dict[el.getAttribute("data-t")];
        if (v == null) return;
        if (el.getAttribute("data-t") === "lede") el.innerHTML = v;
        else el.textContent = v;
      });
      if (dict.title) document.title = dict.title.replace(/[\s🎉!]+$/, "") + " — Perfect10";

      // fallback WhatsApp button: the landing page passes the wa.me link via ?wa=
      var wa = new URLSearchParams(location.search).get("wa");
      var btn = document.getElementById("wa-btn");
      if (wa) {
        btn.setAttribute("href", wa);
      } else {
        // no link passed → hide the re-open button, keep the back-home button
        btn.style.display = "none";
      }
    })();
  </script>
</body>
</html>
